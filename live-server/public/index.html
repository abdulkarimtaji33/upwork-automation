<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upwork Jobs — Live</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, sans-serif; background: #020617; }
    .proposal-content { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
    .proposal-content.open { max-height: 1200px; }
  </style>
</head>
<body class="min-h-screen text-slate-100">
<header class="border-b border-slate-800 bg-slate-900/80 sticky top-0 z-10">
  <div class="max-w-5xl mx-auto px-4 py-3 flex flex-wrap items-center justify-between gap-3">
    <div>
      <h1 class="font-semibold text-white text-sm">Upwork Jobs</h1>
      <p class="text-xs text-slate-500">View · filter · mark proposals sent</p>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <select id="sort-select" onchange="reloadJobs()" class="text-xs bg-slate-950 border border-slate-700 rounded-lg px-2 py-1.5 text-slate-200">
        <option value="score_desc">Score: high → low</option>
        <option value="score_asc">Score: low → high</option>
        <option value="created_desc">Newest first</option>
        <option value="created_asc">Oldest first</option>
      </select>
      <select id="min-score" onchange="reloadJobs()" class="text-xs bg-slate-950 border border-slate-700 rounded-lg px-2 py-1.5 text-slate-200">
        <option value="">All scores</option>
        <option value="50">Score ≥ 50</option>
        <option value="60">Score ≥ 60</option>
        <option value="70">Score ≥ 70</option>
        <option value="80">Score ≥ 80</option>
        <option value="90">Score ≥ 90</option>
      </select>
      <button id="tab-all-btn" onclick="switchView('all')" class="px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-slate-700">All</button>
      <button id="tab-sent-btn" onclick="switchView('sent')" class="px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500">Sent</button>
    </div>
  </div>
</header>

<main class="max-w-5xl mx-auto px-4 py-6">
  <p id="jobs-count" class="text-xs text-slate-500 mb-4">Loading…</p>
  <div id="jobs-list" class="space-y-4"></div>
  <div id="jobs-empty" class="hidden text-center py-16 text-slate-500 text-sm">No jobs yet — local automation will sync them here.</div>
</main>

<div id="sent-overlay" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/75">
  <div class="w-full max-w-md rounded-2xl border border-slate-700 bg-slate-900 p-6">
    <h3 class="font-semibold text-white text-sm mb-1">Mark proposal sent</h3>
    <p id="sent-modal-title" class="text-xs text-slate-500 mb-4 truncate"></p>
    <label class="text-xs text-slate-500 block mb-1">Notes (optional)</label>
    <textarea id="sent-notes" rows="2" class="w-full mb-3 rounded-lg bg-slate-950 border border-slate-700 text-sm text-white p-2"></textarea>
    <label class="text-xs text-slate-500 block mb-1">Evidence (optional)</label>
    <input id="evidence-input" type="file" accept="image/*,.pdf" class="w-full text-xs text-slate-400 mb-4" />
    <div class="flex gap-2">
      <button onclick="closeSentModal()" class="flex-1 py-2 rounded-lg bg-slate-800 text-sm text-slate-300">Cancel</button>
      <button id="sent-confirm-btn" onclick="confirmProposalSent()" class="flex-1 py-2 rounded-lg text-sm font-semibold text-white" style="background:linear-gradient(135deg,#14b8a6,#6366f1)">Confirm</button>
    </div>
  </div>
</div>

<script>
let jobCards = [];
let currentView = 'all';
let sentModalJobUid = null;

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escJs(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/`/g,'\\`');
}

function scoreColor(s) {
  if (s >= 80) return 'text-emerald-400';
  if (s >= 60) return 'text-amber-400';
  return 'text-slate-400';
}

function formatJobPrice(job) {
  if (job.clientBudget) return job.clientBudget;
  const jt = job.jobType || '';
  const m = jt.match(/\$[0-9.,]+(?:\s*[-–]\s*\$?[0-9.,]+)?[KkMm]?/);
  return m ? m[0] : (jt && /hourly|fixed/i.test(jt) ? jt : '');
}

function buildMilestones(job) {
  if (!job.milestones || !job.milestones.length) return '';
  const items = job.milestones.map((m, i) => `
    <li class="text-xs text-slate-300 py-2 border-b border-slate-800 last:border-0">
      <div class="flex flex-wrap items-center gap-2">
        <span class="text-indigo-400 font-medium">${i + 1}. ${esc(m.title)}</span>
        <span class="text-slate-500">${esc(m.duration || '')}</span>
        ${m.quotedPrice ? `<span class="text-emerald-400 font-semibold">${esc(m.quotedPrice)}</span>` : ''}
      </div>
      <p class="text-slate-500 mt-0.5">${esc(m.description || '')}</p>
    </li>`).join('');
  const total = job.quotedTotal && job.quotedTotal !== 'N/A'
    ? `<p class="text-xs text-indigo-300 mt-2 font-medium">Recommended total: ${esc(job.quotedTotal)}</p>` : '';
  return `
    <button onclick="toggleSection('ms-${job.jobUid}')" class="text-xs text-indigo-400 hover:text-indigo-300">
      <span id="ms-lbl-${job.jobUid}">Milestones (${job.milestones.length}) ▾</span>
    </button>
    <div id="ms-${job.jobUid}" class="proposal-content mt-2">
      <ol class="rounded-lg border border-slate-800 bg-slate-950/50 px-3 py-1">${items}</ol>
      ${total}
    </div>`;
}

function buildCard(job) {
  const score = job.score != null ? Math.round(job.score) : '—';
  const sentBlock = job.proposalSent
    ? `<span class="text-xs text-emerald-400">Sent ${job.proposalSentAt ? new Date(job.proposalSentAt).toLocaleDateString() : ''}</span>
       ${job.evidencePath ? `<a href="${esc(job.evidencePath)}" target="_blank" class="text-xs text-slate-400 underline">Evidence</a>` : ''}
       <button onclick="openSentModal('${job.jobUid}', \`${escJs(job.title)}\`)" class="text-xs text-slate-500 hover:text-white">Edit</button>`
    : `<button onclick="openSentModal('${job.jobUid}', \`${escJs(job.title)}\`)" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-emerald-800/50 text-emerald-400 hover:bg-emerald-900/30">Mark sent</button>`;

  return `<article id="card-${job.jobUid}" class="rounded-2xl border border-slate-800 bg-slate-900/60 p-4">
    <div class="flex justify-between gap-2 mb-2">
      <a href="${esc(job.link)}" target="_blank" class="font-medium text-white text-sm hover:text-indigo-300">${esc(job.title)}</a>
      <span class="text-sm font-bold tabular-nums ${scoreColor(Number(job.score))}">${score}</span>
    </div>
    <p class="text-xs text-slate-500 mb-2 flex flex-wrap gap-x-3 gap-y-1">
      ${job.clientLocation ? `<span>📍 ${esc(job.clientLocation)}</span>` : ''}
      ${formatJobPrice(job) ? `<span class="text-emerald-400 font-medium">💵 ${esc(formatJobPrice(job))}</span>` : ''}
      ${job.budgetType && job.budgetType !== 'unknown' ? `<span class="text-slate-600">${esc(job.budgetType)}</span>` : ''}
    </p>
    <p class="text-xs text-slate-600 mb-3">${job.postedAt ? 'Posted ' + esc(job.postedAt) : ''}${job.experienceLevel ? ' · ' + esc(job.experienceLevel) : ''}${job.quotedTotal && job.quotedTotal !== 'N/A' ? ' · Bid ' + esc(job.quotedTotal) : ''}</p>
    <div class="flex flex-wrap gap-3 items-center mb-2">
      <a href="${esc(job.link)}" target="_blank" class="text-xs text-slate-400 underline">Open on Upwork</a>
      ${job.proposalDraft ? `<button onclick="toggleSection('proposal-${job.jobUid}', 'prop-lbl-${job.jobUid}')" class="text-xs text-indigo-400"><span id="prop-lbl-${job.jobUid}">Proposal draft ▾</span></button>` : ''}
      ${buildMilestones(job)}
      <div class="ml-auto flex items-center gap-2">${sentBlock}</div>
    </div>
    ${job.proposalDraft ? `<div id="proposal-${job.jobUid}" class="proposal-content mt-2 pt-2 border-t border-slate-800"><pre class="text-xs text-slate-300 whitespace-pre-wrap font-sans">${esc(job.proposalDraft)}</pre></div>` : ''}
    ${job.reasoning ? `<p class="text-xs text-slate-600 mt-2 line-clamp-2">${esc(job.reasoning)}</p>` : ''}
    ${job.notes ? `<p class="text-xs text-slate-600 mt-2">Note: ${esc(job.notes)}</p>` : ''}
  </article>`;
}

function toggleSection(id, lblId) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('open');
}

function renderAllCards() {
  const list = document.getElementById('jobs-list');
  const empty = document.getElementById('jobs-empty');
  if (!jobCards.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML = jobCards.map(buildCard).join('');
}

function queryParams() {
  const sort = document.getElementById('sort-select').value;
  const minScore = document.getElementById('min-score').value;
  const params = new URLSearchParams();
  if (currentView === 'sent') params.set('sent', 'true');
  if (sort) params.set('sort', sort);
  if (minScore) params.set('minScore', minScore);
  return params.toString() ? '?' + params.toString() : '';
}

async function loadJobs() {
  const r = await fetch('/api/jobs' + queryParams());
  jobCards = await r.json();
  document.getElementById('jobs-count').textContent = `${jobCards.length} job(s)`;
  renderAllCards();
}

async function reloadJobs() {
  await loadJobs();
}

async function switchView(view) {
  currentView = view;
  document.getElementById('tab-all-btn').className = view === 'all'
    ? 'px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-slate-700'
    : 'px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500';
  document.getElementById('tab-sent-btn').className = view === 'sent'
    ? 'px-3 py-1.5 rounded-lg text-xs font-medium text-white bg-slate-700'
    : 'px-3 py-1.5 rounded-lg text-xs font-medium text-slate-500';
  await loadJobs();
}

function openSentModal(jobUid, title) {
  sentModalJobUid = jobUid;
  document.getElementById('sent-modal-title').textContent = title;
  document.getElementById('sent-notes').value = '';
  document.getElementById('evidence-input').value = '';
  const o = document.getElementById('sent-overlay');
  o.classList.remove('hidden');
  o.classList.add('flex');
}

function closeSentModal() {
  document.getElementById('sent-overlay').classList.add('hidden');
  document.getElementById('sent-overlay').classList.remove('flex');
  sentModalJobUid = null;
}

async function confirmProposalSent() {
  if (!sentModalJobUid) return;
  const btn = document.getElementById('sent-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const form = new FormData();
    form.append('sent', 'true');
    const notes = document.getElementById('sent-notes').value.trim();
    if (notes) form.append('notes', notes);
    const file = document.getElementById('evidence-input').files[0];
    if (file) form.append('evidence', file);
    const r = await fetch(`/api/jobs/${sentModalJobUid}/proposal-sent`, { method: 'POST', body: form });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Failed');
    closeSentModal();
    await loadJobs();
  } catch (e) {
    alert(e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Confirm';
  }
}

loadJobs();
</script>
</body>
</html>
